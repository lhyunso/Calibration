name: Build Windows EXE

on:
  push:
    tags:
      - "v*"          # v1.0.0 형식 태그를 push하면 자동 빌드
  workflow_dispatch:  # GitHub UI에서 수동 실행도 가능

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller MCAL.spec --clean --noconfirm

      - name: Zip artifact
        run: |
          Compress-Archive -Path dist\MCAL\* -DestinationPath MCAL_windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCAL_windows
          path: MCAL_windows.zip
          retention-days: 30

      # 태그 push일 때는 GitHub Release에도 자동 첨부
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MCAL_windows.zip
          generate_release_notes: true
